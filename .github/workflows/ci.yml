name: Public CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend validation
    runs-on: ubuntu-latest
    env:
      AI_EXTERNAL_PROVIDERS_ENABLED: "false"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ai_soc_ci
      POSTGRES_USER: ai_soc_ci
      POSTGRES_PASSWORD: ci-only
      PYTHONPATH: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run AI SOC CLI smoke validation
        run: python scripts/validate_cli_smoke.py

      - name: Run lightweight release readiness check
        run: ./ai-soc release-check --skip-runtime --skip-frontend-build --skip-pytest --skip-docker-build --json

      - name: Compile tracked Python files
        run: git ls-files -z '*.py' | xargs -0 python -m py_compile

      - name: Run backend tests
        shell: bash
        run: |
          pytest_args=()

          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "::notice title=Branch-sensitive tests skipped::The validation harness intentionally rejects execution on main"
            pytest_args+=(
              --deselect=tests/test_v0_7_validation_harness.py::test_ci_mode_writes_reports_without_live_runtime
              --deselect=tests/test_v0_7_validation_harness.py::test_local_mode_handles_unavailable_api_as_warning
              --deselect=tests/test_v0_7_validation_harness.py::test_reports_do_not_contain_token_value
            )
          fi

          python -m pytest -q "${pytest_args[@]}"

  frontend:
    name: Frontend validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  config:
    name: Configuration validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate public CI baseline
        run: python3 scripts/validate_public_ci_baseline.py

      - name: Validate public compose files
        shell: bash
        run: |
          docker compose -f deploy/observability/docker-compose.loki.yml config --quiet
          docker compose -f deploy/suricata/docker-compose.yml config --quiet

          if [[ -f deploy/observability/ntfy-bridge/.env ]]; then
            docker compose -f deploy/observability/docker-compose.yml config --quiet
          else
            echo "::notice title=Compose validation skipped::deploy/observability/docker-compose.yml requires the intentionally untracked deploy/observability/ntfy-bridge/.env file"
          fi

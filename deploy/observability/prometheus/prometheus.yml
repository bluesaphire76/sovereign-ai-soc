global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - 127.0.0.1:8082

  - job_name: ai-soc-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8008

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:6333

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ai-soc-prometheus
    restart: unless-stopped
    network_mode: host
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ai_soc_prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: ai-soc-grafana
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-local-only}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:3002/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ai_soc_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ai_soc_observability

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai-soc-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - "/:/host:ro"
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - ai_soc_observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: ai-soc-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    ports:
      - "127.0.0.1:8082:8080"
    networks:
      - ai_soc_observability

volumes:
  ai_soc_prometheus_data:
  ai_soc_grafana_data:

networks:
  ai_soc_observability:
    name: ai_soc_observability

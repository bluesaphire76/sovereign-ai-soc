<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Sovereign AI SOC high-level architecture</title>
  <desc id="desc">High-level local-first SOC architecture showing analyst console, FastAPI, PostgreSQL, Qdrant semantic memory, AI provider data control, Wazuh, Suricata, DNS telemetry, correlation, incidents, cases, investigation graph, governed remediation and observability.</desc>

      .small { fill: #cbd5e1; font: 400 10.5px Arial, sans-serif; text-anchor: middle; }
      .edge { stroke: #22d3ee; stroke-width: 1.55; fill: none; marker-end: url(#arrow); }
      .storeEdge { stroke: #64748b; stroke-width: 1.15; fill: none; stroke-dasharray: 5 4; marker-end: url(#storeArrow); opacity: 0.85; }

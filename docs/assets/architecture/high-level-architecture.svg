<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sovereign AI SOC high-level architecture</title>
  <desc id="desc">High-level local-first SOC architecture showing analyst console, FastAPI, PostgreSQL, Ollama, Wazuh, Suricata, DNS telemetry, event normalization, correlation, incidents, cases and reports.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee"/>
    </marker>
    <marker id="storeArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #020617; }
      .node { fill: #0f172a; stroke: #334155; stroke-width: 1.2; rx: 8; }
      .source { fill: #111827; stroke: #64748b; stroke-width: 1.2; rx: 8; }
      .store { fill: #0b1220; stroke: #60a5fa; stroke-width: 1.2; rx: 8; }
      .ai { fill: #17112b; stroke: #a78bfa; stroke-width: 1.2; rx: 8; }
      .workflow { fill: #082f49; stroke: #22d3ee; stroke-width: 1.2; rx: 8; }
      .report { fill: #052e2b; stroke: #10b981; stroke-width: 1.2; rx: 8; }
      .title { fill: #e5e7eb; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 400 14px Arial, sans-serif; }
      .section { fill: #94a3b8; font: 700 12px Arial, sans-serif; letter-spacing: 1px; }
      .label { fill: #e5e7eb; font: 700 13px Arial, sans-serif; text-anchor: middle; }
      .small { fill: #cbd5e1; font: 400 10.5px Arial, sans-serif; text-anchor: middle; }
      .edge { stroke: #22d3ee; stroke-width: 1.55; fill: none; marker-end: url(#arrow); }
      .storeEdge { stroke: #64748b; stroke-width: 1.15; fill: none; stroke-dasharray: 5 4; marker-end: url(#storeArrow); opacity: 0.85; }
    </style>
  </defs>

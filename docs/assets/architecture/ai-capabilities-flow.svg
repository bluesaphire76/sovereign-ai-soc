<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">AI capabilities flow</title>
  <desc id="desc">Evidence and context flow into incident AI analysis, command brief, risk rationale, recommended actions, HOW TO EXECUTE guidance, case analysis, detection quality, report enrichment and human approval.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a78bfa"/>
    </marker>
    <style>
      .bg { fill: #020617; }
      .box { fill: #0f172a; stroke: #334155; stroke-width: 1.2; rx: 8; }
      .ai { fill: #17112b; stroke: #a78bfa; stroke-width: 1.2; rx: 8; }
      .action { fill: #082f49; stroke: #22d3ee; stroke-width: 1.2; rx: 8; }
      .human { fill: #052e2b; stroke: #10b981; stroke-width: 1.2; rx: 8; }
      .title { fill: #e5e7eb; font: 700 28px Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 400 14px Arial, sans-serif; }
      .label { fill: #e5e7eb; font: 700 15px Arial, sans-serif; text-anchor: middle; }
      .small { fill: #cbd5e1; font: 400 12px Arial, sans-serif; text-anchor: middle; }
      .edge { stroke: #a78bfa; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .muted { stroke: #64748b; stroke-width: 1.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1180" height="700"/>
  <text class="title" x="48" y="58">AI Capabilities Flow</text>
  <text class="subtitle" x="48" y="84">Local AI supports analysis, explanation, guidance and reporting while the analyst remains in control.</text>

  <rect class="box" x="60" y="160" width="190" height="76"/>
  <text class="label" x="155" y="192">Evidence Context</text>
  <text class="small" x="155" y="214">Incidents / cases / telemetry</text>

  <rect class="ai" x="320" y="160" width="210" height="76"/>
  <text class="label" x="425" y="192">Incident AI Analysis</text>
  <text class="small" x="425" y="214">Situation and interpretation</text>
  <rect class="ai" x="600" y="160" width="210" height="76"/>
  <text class="label" x="705" y="192">Command Brief</text>
  <text class="small" x="705" y="214">Structured analyst briefing</text>

  <rect class="action" x="900" y="90" width="210" height="70"/>
  <text class="label" x="1005" y="120">Risk Rationale</text>
  <text class="small" x="1005" y="142">Why it matters</text>
  <rect class="action" x="900" y="190" width="210" height="70"/>
  <text class="label" x="1005" y="220">Evidence Summary</text>
  <text class="small" x="1005" y="242">Signals and limitations</text>
  <rect class="action" x="900" y="290" width="210" height="70"/>
  <text class="label" x="1005" y="320">Recommended Actions</text>
  <text class="small" x="1005" y="342">Analyst guidance</text>

  <rect class="ai" x="600" y="410" width="210" height="76"/>
  <text class="label" x="705" y="442">HOW TO EXECUTE</text>
  <text class="small" x="705" y="464">Explicit AI suggestion</text>
  <rect class="ai" x="320" y="410" width="210" height="76"/>
  <text class="label" x="425" y="442">Case / Detection AI</text>
  <text class="small" x="425" y="464">Gaps and next steps</text>
  <rect class="action" x="60" y="410" width="190" height="76"/>
  <text class="label" x="155" y="442">Report Enrichment</text>
  <text class="small" x="155" y="464">Executive and evidence packs</text>

  <rect class="human" x="900" y="510" width="210" height="76"/>
  <text class="label" x="1005" y="542">Human Approval</text>
  <text class="small" x="1005" y="564">Validate, decide, act</text>

  <path class="edge" d="M250 198 H320"/>
  <path class="edge" d="M530 198 H600"/>
  <path class="edge" d="M810 198 C850 155 860 125 900 125"/>
  <path class="edge" d="M810 198 H900"/>
  <path class="edge" d="M810 198 C850 255 860 325 900 325"/>
  <path class="edge" d="M1005 360 V510"/>
  <path class="edge" d="M900 548 H810 C750 548 720 520 705 486"/>
  <path class="muted" d="M600 448 H530"/>
  <path class="muted" d="M320 448 H250"/>
  <path class="muted" d="M155 410 V236"/>
  <path class="muted" d="M425 410 V236"/>
</svg>
